name: ci

on:
  push:
    branches: [master, main, v2-rebuild]
  pull_request:
    branches: [master, main, v2-rebuild]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typescript:
    name: TypeScript build + tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Dependency security audit
        # Gate on critical severity only. High findings in this repo are
        # confined to transitive build-tool dependencies (hardhat/solc, wagmi,
        # rainbowkit) that cannot be upgraded without breaking contract builds
        # or the frontend. They carry no runtime exploit surface in the
        # deployed bridge. Overrides in the root package.json fix every
        # high/critical vulnerability in deps that do accept a patch.
        # Re-evaluate this threshold when hardhat or wagmi release a major
        # version that resolves their transitive dep chain.
        run: pnpm audit --audit-level critical
        continue-on-error: false

      - name: Build All Packages
        run: pnpm --filter "@wafflefinance/*" build

      - name: Validate Workspace (Manifests and Exports)
        run: pnpm run validate:manifests

      - name: Validate Deployment Artifacts
        run: pnpm run validate:deployments

      - name: Typecheck — SDK
        run: pnpm --filter @wafflefinance/sdk exec tsc --noEmit

      - name: Typecheck — coordinator
        run: pnpm --filter @wafflefinance/coordinator exec tsc --noEmit

      - name: Typecheck — resolver
        run: pnpm --filter @wafflefinance/resolver exec tsc --noEmit

      - name: Typecheck — frontend
        run: pnpm --filter @wafflefinance/frontend exec tsc --noEmit

      - name: Test — SDK
        run: pnpm --filter @wafflefinance/sdk test

      - name: Test — frontend
        run: pnpm --filter @wafflefinance/frontend test

      - name: Test — coordinator
        run: pnpm --filter @wafflefinance/coordinator test

      - name: Compile contracts
        run: pnpm --filter @wafflefinance/contracts compile

      - name: Test — contracts (Hardhat)
        run: pnpm --filter @wafflefinance/contracts exec hardhat test test/HTLCEscrow.test.ts test/ResolverRegistry.test.ts

  soroban:
    name: Soroban contracts
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: soroban
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown,wasm32v1-none

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            soroban/target
          key: soroban-${{ runner.os }}-${{ hashFiles('soroban/Cargo.toml', 'soroban/contracts/**/Cargo.toml') }}

      - name: Build contracts
        run: cargo build
